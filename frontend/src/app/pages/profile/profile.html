<div class="container">
  <h2 class="mb-4">My Profile</h2>

  <div class="row">
    <div class="col-md-5 mb-3">
      <div class="card p-3 shadow-sm">
        <h5>Account Details</h5>
        <div class="mt-2"><strong>Name:</strong> {{ profile.name || '-' }}</div>
        <div><strong>Email:</strong> {{ profile.email || '-' }}</div>
        <div><strong>Role:</strong> {{ profile.role || '-' }}</div>
        <div><strong>Joined:</strong> {{ profile.createdAt | date:'mediumDate' }}</div>
        <div class="text-muted mt-3">Change password will be added later.</div>
      </div>
    </div>

    <div class="col-md-7 mb-3">
      <div class="card p-3 shadow-sm">
        <h5>Edit Profile</h5>
        <label class="form-label mt-2">Name</label>
        <input class="form-control mb-2" [(ngModel)]="name">

        <label class="form-label">Email</label>
        <input type="email" class="form-control mb-3" [(ngModel)]="email">

        <button class="btn btn-primary" (click)="updateProfile()">
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
