<div class="container">
  <h2 class="mb-4">Leave Approvals</h2>

  <div class="card p-3 mb-3 shadow-sm">
    <div class="row">
      <div class="col-md-4 mb-2">
        <select class="form-select" [(ngModel)]="statusFilter">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="col-md-8 mb-2">
        <input class="form-control" placeholder="Admin note" [(ngModel)]="adminNote">
      </div>
    </div>
  </div>

  <div class="card p-3 shadow-sm">
    <div *ngIf="filteredLeaves().length === 0" class="text-muted">No leave requests found</div>
    <div *ngFor="let leave of filteredLeaves()" class="border p-2 mb-2 rounded">
      <div class="d-flex justify-content-between">
        <strong>{{ leave.student?.name }}</strong>
        <span class="badge bg-secondary">{{ leave.status }}</span>
      </div>
      <div>{{ leave.fromDate | date:'mediumDate' }} - {{ leave.toDate | date:'mediumDate' }}</div>
      <div>Reason: {{ leave.reason }}</div>
      <div *ngIf="leave.adminNote">Admin Note: {{ leave.adminNote }}</div>
      <div class="d-flex gap-2 mt-2" *ngIf="leave.status === 'pending'">
        <button class="btn btn-success btn-sm" (click)="updateLeave(leave._id, 'approved')">Approve</button>
        <button class="btn btn-outline-danger btn-sm" (click)="updateLeave(leave._id, 'rejected')">Reject</button>
      </div>
    </div>
  </div>
</div>
